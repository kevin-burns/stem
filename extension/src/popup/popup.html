<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Shortener</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="mb-5 text-center"><h1 class="text-xl font-bold text-indigo-600">Link Shortener</h1></div>

  <div id="setup" class="hidden mb-3 p-3 rounded-lg bg-amber-50 border-amber text-sm">
    Not configured yet. <a id="openOptions" href="#" class="text-indigo-600 underline">Open settings</a>.
  </div>

  <div id="form" class="space-y-3 mb-6 bg-white p-4 rounded-xl shadow-sm border">
    <div class="flex flex-col">
      <label class="text-sm font-semibold mb-1">Target URL</label>
      <input id="url" type="text" placeholder="https://..." />
    </div>
    <div class="flex flex-col">
      <label class="text-sm font-semibold mb-1">Custom Slug (Optional)</label>
      <div class="flex items-center border rounded-lg slug-wrap">
        <span id="slugPrefix" class="bg-gray-100 p-2 text-gray-500 text-xs slug-prefix"></span>
        <input id="slug" type="text" placeholder="my-link" />
      </div>
    </div>
    <div class="flex flex-col">
      <label class="text-sm font-semibold mb-1">Expiry</label>
      <select id="expiry">
        <option value="never">Never</option>
        <option value="1h">1 Hour</option>
        <option value="24h">24 Hours</option>
        <option value="7d">7 Days</option>
        <option value="once">One-time use</option>
      </select>
    </div>
    <button id="shorten" class="w-full btn-primary">Shorten Link</button>
    <p id="msg" class="text-xs" role="status"></p>
  </div>

  <div class="border-t pt-4">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-bold">Recent Links</h2>
      <input id="search" type="search" placeholder="Search..." class="w-24 text-xs" />
    </div>
    <div id="recent" class="space-y-2"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
