name = "url-shortener"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Non-secret config only. Secrets (incl. SHORT_DOMAIN) go through `wrangler secret put`
# so the real hostname is never committed to the repo.
[vars]
REPUTATION_PROVIDER = "google-safe-browsing"
# SHORT_DOMAIN is provided as a secret: `wrangler secret put SHORT_DOMAIN`
# (and in .dev.vars for local dev). Do NOT add it here.

[[d1_databases]]
binding = "DB"
database_name = "url_shortener"
database_id = "REPLACE_WITH_YOUR_D1_ID"  # from `wrangler d1 create url_shortener`
