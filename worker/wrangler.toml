name = "url-shortener"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Non-secret config only. Secrets go through `wrangler secret put`.
[vars]
REPUTATION_PROVIDER = "google-safe-browsing"
SHORT_DOMAIN = "l.example.com"

[[d1_databases]]
binding = "DB"
database_name = "url_shortener"
database_id = "REPLACE_WITH_YOUR_D1_ID"  # from `wrangler d1 create url_shortener`
